name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm
          POSTGRES_DB: crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crm -d crm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://crm:crm@localhost:5432/crm
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # @prisma/client's postinstall can't resolve the `prisma` CLI (a devDependency
      # of apps/api only) from its own nested location under pnpm's isolated
      # node_modules, so it silently skips codegen. Generate explicitly instead of
      # relying on postinstall.
      - run: pnpm --filter @crm/api exec prisma generate

      # Consumed as prebuilt types/JS by api and web; must exist before their lint/build.
      - run: pnpm --filter @crm/shared build

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm --filter @crm/api exec prisma migrate deploy

      - run: pnpm --filter @crm/api test

      - run: pnpm --filter @crm/api test:e2e

      - run: pnpm --filter @crm/web test
